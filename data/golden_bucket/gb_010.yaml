question: Which traffic sources bring the most revenue?
sql: 'SELECT u.traffic_source, SUM(oi.sale_price) AS revenue, COUNT(DISTINCT oi.order_id)
  AS orders

  FROM `bigquery-public-data.thelook_ecommerce.order_items` oi

  JOIN `bigquery-public-data.thelook_ecommerce.users` u ON oi.user_id=u.id

  GROUP BY u.traffic_source

  ORDER BY revenue DESC'
report: Rank acquisition channels by revenue and order count together, since a channel
  can drive many low-value orders or few high-value ones. Flag whichever channel has
  the best revenue-per-order as the one worth protecting budget for, not just the
  top-line revenue leader.
